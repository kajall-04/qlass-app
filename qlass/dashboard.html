<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qlass — Dashboard</title>
  <meta name="description" content="Qlass Education ERP Admin Dashboard — Manage classes, students, teachers, lectures, and academic operations.">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='8' fill='%232563EB'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='Inter' font-weight='800' font-size='20'>Q</text></svg>">
  <style>
    /* Page-specific inline styles for dashboard pages */
    .page-section { display: none; }
    .page-section.active { display: block; animation: fadeInUp 0.3s ease both; }
    .chart-canvas { width: 100%; height: 220px; background: var(--color-surface); border: var(--border-width) solid var(--color-border); border-radius: var(--radius-xl); padding: var(--space-4); }
    .activity-item { display: flex; gap: var(--space-3); padding: var(--space-3) 0; border-bottom: 1px solid var(--color-border-light); }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
    .activity-text { font-size: var(--text-sm); color: var(--color-text); }
    .activity-time { font-size: var(--text-xs); color: var(--color-text-tertiary); }
    .quick-action { display: flex; flex-direction: column; align-items: center; gap: var(--space-2); padding: var(--space-5); background: var(--color-surface); border: var(--border-width) solid var(--color-border); border-radius: var(--radius-xl); cursor: pointer; transition: all var(--transition-base); text-align: center; }
    .quick-action:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--color-secondary); }
    .quick-action-icon { width: 44px; height: 44px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; }
    .quick-action-label { font-size: var(--text-sm); font-weight: var(--font-medium); color: var(--color-text); }
    .class-detail-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--color-border); margin-bottom: var(--space-5); overflow-x: auto; }
    .class-detail-tab { padding: var(--space-3) var(--space-4); font-size: var(--text-sm); font-weight: var(--font-medium); color: var(--color-text-secondary); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; white-space: nowrap; transition: all var(--transition-fast); }
    .class-detail-tab:hover { color: var(--color-text); }
    .class-detail-tab.active { color: var(--color-secondary); border-bottom-color: var(--color-secondary); }
    .insight-card { background: var(--color-surface); border: var(--border-width) solid var(--color-border); border-radius: var(--radius-xl); padding: var(--space-5); }
    .insight-card-header { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-4); }
    .insight-card-title { font-size: var(--text-base); font-weight: var(--font-semibold); }
    .risk-item { display: flex; align-items: center; justify-content: space-between; padding: var(--space-3) 0; border-bottom: 1px solid var(--color-border-light); }
    .risk-item:last-child { border-bottom: none; }
    .risk-score { padding: 4px 12px; border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: var(--font-bold); }
    .risk-high { background: var(--color-danger-50); color: var(--color-danger); }
    .risk-medium { background: var(--color-warning-50); color: var(--color-warning-dark); }
    .notif-item { display: flex; gap: var(--space-3); padding: var(--space-4); border-bottom: 1px solid var(--color-border-light); cursor: pointer; transition: background var(--transition-fast); }
    .notif-item:hover { background: var(--color-surface-hover); }
    .notif-item.unread { background: var(--color-secondary-50); }
    .notif-icon { width: 36px; height: 36px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: var(--text-base); }
    .notif-title { font-size: var(--text-sm); font-weight: var(--font-semibold); }
    .notif-message { font-size: var(--text-xs); color: var(--color-text-secondary); margin-top: 2px; }
    .notif-time { font-size: 11px; color: var(--color-text-tertiary); margin-top: 4px; }
    .profile-section { background: var(--color-surface); border: var(--border-width) solid var(--color-border); border-radius: var(--radius-xl); padding: var(--space-6); margin-bottom: var(--space-5); }
    .profile-header { display: flex; align-items: center; gap: var(--space-5); margin-bottom: var(--space-6); }
    .profile-avatar-lg { width: 80px; height: 80px; border-radius: var(--radius-full); background: var(--color-secondary); display: flex; align-items: center; justify-content: center; font-size: var(--text-2xl); font-weight: var(--font-bold); color: white; }
    .profile-info h2 { font-size: var(--text-xl); font-weight: var(--font-bold); }
    .profile-info p { font-size: var(--text-sm); color: var(--color-text-secondary); }
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: var(--space-4) 0; border-bottom: 1px solid var(--color-border-light); }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: var(--text-sm); font-weight: var(--font-medium); }
    .settings-desc { font-size: var(--text-xs); color: var(--color-text-secondary); }
  </style>
</head>
<body>
  <div class="app-shell">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">Q</div>
        <div class="sidebar-brand">
          <span class="sidebar-brand-name">Qlass</span>
          <span class="sidebar-brand-sub">Education ERP</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <button class="nav-item active" data-page="dashboard" id="nav-dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span class="nav-label">Dashboard</span>
        </button>
        <button class="nav-item" data-page="classes" id="nav-classes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          <span class="nav-label">Classes</span>
          <span class="nav-badge">6</span>
        </button>
        <button class="nav-item" data-page="students" id="nav-students">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="nav-label">Students</span>
        </button>
        <button class="nav-item" data-page="teachers" id="nav-teachers">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="nav-label">Teachers</span>
        </button>

        <div class="nav-section-label">Academics</div>
        <button class="nav-item" data-page="lectures" id="nav-lectures">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          <span class="nav-label">Lectures</span>
        </button>
        <button class="nav-item" data-page="dpp" id="nav-dpp">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span class="nav-label">DPP</span>
          <span class="nav-badge">45</span>
        </button>
        <button class="nav-item" data-page="audit" id="nav-audit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <span class="nav-label">Classroom Audit</span>
        </button>

        <div class="nav-section-label">Intelligence</div>
        <button class="nav-item" data-page="ai-insights" id="nav-ai-insights">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10"/><circle cx="12" cy="12" r="3"/></svg>
          <span class="nav-label">AI Insights</span>
        </button>

        <div class="nav-section-label">System</div>
        <button class="nav-item" data-page="notifications" id="nav-notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="nav-label">Notifications</span>
          <span class="nav-badge">2</span>
        </button>
        <button class="nav-item" data-page="profile" id="nav-profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span class="nav-label">Settings</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-profile" onclick="QlassApp.navigateTo('profile')">
          <div class="sidebar-profile-avatar">AK</div>
          <div class="sidebar-profile-info">
            <div class="sidebar-profile-name">Ankit Kumar</div>
            <div class="sidebar-profile-role">Super Admin</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- SIDEBAR OVERLAY (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <!-- TOP BAR -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <button class="topbar-toggle" id="sidebarToggle" aria-label="Toggle sidebar" data-tooltip="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          </button>
          <div>
            <h1 class="topbar-title" id="pageTitle">Dashboard</h1>
          </div>
        </div>
        <div class="topbar-right">
          <div class="topbar-search">
            <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="text" placeholder="Search anything..." id="globalSearch" aria-label="Search">
            <span class="search-shortcut">⌘K</span>
          </div>
          <button class="topbar-notification" id="notifBtn" aria-label="Notifications" data-tooltip="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notif-dot"></span>
          </button>
          <button class="btn-icon btn-ghost" id="themeToggle" aria-label="Toggle theme" data-tooltip="Toggle dark mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <div class="avatar avatar-blue" style="cursor:pointer;" onclick="QlassApp.navigateTo('profile')" data-tooltip="Profile">AK</div>
        </div>
      </header>

      <!-- DYNAMIC PAGE CONTENT -->
      <main class="page-content" id="pageContent">
        <!-- Content rendered by JS -->
      </main>
    </div>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="mobile-nav">
      <div class="mobile-nav-items">
        <button class="mobile-nav-item active" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Home
        </button>
        <button class="mobile-nav-item" data-page="students">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          Students
        </button>
        <button class="mobile-nav-item" data-page="classes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Classes
        </button>
        <button class="mobile-nav-item" data-page="ai-insights">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/></svg>
          AI
        </button>
        <button class="mobile-nav-item" data-page="profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4"/></svg>
          Settings
        </button>
      </div>
    </nav>

    <!-- RIGHT DRAWER -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="drawer">
      <div class="drawer-header">
        <h3 id="drawerTitle" style="font-size:var(--text-base);font-weight:var(--font-semibold);">Details</h3>
        <button class="drawer-close" id="drawerClose" aria-label="Close drawer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="drawer-body" id="drawerBody">
        <!-- Dynamic content -->
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
